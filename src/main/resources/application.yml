spring:
  application:
    name: polizas-api
  datasource:
    url: jdbc:h2:mem:polizasdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

app:
  ipc: 0.10
  api-key: 123456

logging:
  level:
    com.company.polizas: INFO
